<div class="flex min-h-screen items-center justify-center bg-[#FFE7B3] px-4">
  <div class="w-full max-w-sm rounded-lg bg-white p-8 text-center shadow-lg">
    <h1 class="mb-2 text-2xl font-semibold text-[#230C00]">Babel</h1>
    <p class="mb-8 text-sm text-[#230C00]/70">
      Catálogo e inventario de la librería de Le Tiende
    </p>

    <button
      type="button"
      class="w-full rounded-md bg-[#E8630A] px-4 py-3 font-medium text-white transition-opacity hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50"
      [disabled]="cargando()"
      (click)="ingresarConGoogle()"
    >
      {{ cargando() ? 'Ingresando…' : 'Ingresar con Google' }}
    </button>

    @if (mensajeError()) {
      <p class="mt-4 text-sm text-red-700">{{ mensajeError() }}</p>
    }
  </div>
</div>
