                    - dynamodb:UpdateItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    ListarVentasLambdaRole:
