service: babel-letiende

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs24.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  httpApi:
    cors: true
  # Cada función define su propio rol de mínimo privilegio más abajo
  # (ver `resources.Resources.ApiLambdaRole` / `SsrLambdaRole`) — ver
  # CLAUDE.md §5 (A05: configuración de seguridad incorrecta).

package:
  individually: true

custom:
  nombresTablas:
    libros: babel-libros-${sls:stage}
    ventas: babel-ventas-${sls:stage}
    estantes: babel-estantes-${sls:stage}
    editorialesDescuentos: babel-editoriales-descuentos-${sls:stage}
    usuarios: babel-usuarios-${sls:stage}

functions:
  api:
    handler: dist-server/api/handlers/health.handler
    role: !GetAtt ApiLambdaRole.Arn
    description: >-
      Lógica de negocio de Babel (catalogación, ventas, administración).
      Por ahora solo expone /api/health como placeholder de verificación.
    environment:
      # Nombres "lógicos" (ver tech-specs.md §5.1) resueltos a los nombres
      # reales de tabla por stage, para no chocar entre dev/staging/production.
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_VENTAS: ${self:custom.nombresTablas.ventas}
      TABLA_ESTANTES: ${self:custom.nombresTablas.estantes}
      TABLA_EDITORIALES_DESCUENTOS: ${self:custom.nombresTablas.editorialesDescuentos}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      # Secretos/config externa (tech-specs.md §9) — nunca hardcodeados,
      # quedan vacíos si la variable de entorno no está definida.
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${env:GOOGLE_CUSTOM_SEARCH_API_KEY, ''}
      GOOGLE_CUSTOM_SEARCH_CX: ${env:GOOGLE_CUSTOM_SEARCH_CX, ''}
      API_LETIENDE_BASE_URL: ${env:API_LETIENDE_BASE_URL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/health.js'
    events:
      - httpApi:
          path: /api/health
          method: get
      - httpApi:
          path: /api/{proxy+}
          method: '*'

  usuariosMe:
    handler: dist-server/api/handlers/usuarios-me.handler
    role: !GetAtt UsuariosMeLambdaRole.Arn
    description: >-
      GET /api/usuarios/me — verifica el ID Token de Firebase y resuelve
      el rol contra babel-usuarios (CLAUDE.md A01/A07, tech-specs.md §8.1).
    environment:
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/usuarios-me.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # `firebase-admin` (y sus dependencias transitivas: google-auth-library,
        # jose, gaxios, etc.) y `@aws-sdk/*` no se pueden empaquetar con una
        # lista manual confiable — se incluye node_modules completo para esta
        # función en vez de mantener un allowlist frágil.
        - 'node_modules/**'
    events:
      - httpApi:
          path: /api/usuarios/me
          method: get

  libros:
    handler: dist-server/api/handlers/libros.handler
    role: !GetAtt LibrosLambdaRole.Arn
    description: >-
      GET /api/libros — catálogo público de consulta, sin autenticación
      (tech-specs.md §5).
    environment:
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/libros.js'
        - 'dist-server/api/services/dynamodb.js'
        # `libros.js` compilado incluye TANTO `handler` (GET, este) como
        # `handlerCrear` (POST, función `catalogarLibro`) — ambos exports
        # viven en el mismo módulo, así que el `import` de nivel superior a
        # `verificar-token` (usado solo por `handlerCrear`) igual debe
        # resolver aquí, o el runtime de Lambda revienta con
        # `Runtime.ImportModuleError` al invocar CUALQUIER handler del
        # archivo — confirmado en un 500 real en staging (ver MEMORY.md §7).
        - 'dist-server/api/lib/verificar-token.js'
        # Igual que en usuariosMe: no se intenta un allowlist manual de las
        # dependencias transitivas de @aws-sdk/* (ver gotcha de jose/jwks-rsa
        # en MEMORY.md §7) — se incluye node_modules completo.
        - 'node_modules/**'
    events:
      - httpApi:
          path: /api/libros
          method: get

  catalogarLibro:
    handler: dist-server/api/handlers/libros.handlerCrear
    role: !GetAtt CatalogarLibroLambdaRole.Arn
    description: >-
      POST /api/libros — cataloga un libro, exige rol vendedor o
      administrador (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/libros.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Misma función (libros.ts) que el GET público, pero esta Lambda
        # además verifica tokens con firebase-admin — igual que usuariosMe,
        # se incluye node_modules completo en vez de un allowlist manual.
        - 'node_modules/**'
    events:
      - httpApi:
          path: /api/libros
          method: post

  estantes:
    handler: dist-server/api/handlers/estantes.handler
    role: !GetAtt EstantesLambdaRole.Arn
    description: >-
      CRUD /api/estantes — exige rol administrador exclusivamente
      (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_ESTANTES: ${self:custom.nombresTablas.estantes}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/estantes.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Verifica tokens con firebase-admin — igual que usuariosMe/
        # catalogarLibro, se incluye node_modules completo en vez de un
        # allowlist manual (ver gotcha de jose/jwks-rsa en MEMORY.md §7).
        - 'node_modules/**'
    events:
      - httpApi:
          path: /api/estantes
          method: get
      - httpApi:
          path: /api/estantes
          method: post
      - httpApi:
          path: /api/estantes/{estanteId}
          method: put
      - httpApi:
          path: /api/estantes/{estanteId}
          method: delete

  registrarVenta:
    handler: dist-server/api/handlers/ventas.handler
    role: !GetAtt RegistrarVentaLambdaRole.Arn
    description: >-
      POST /api/ventas — registra una venta, exige rol vendedor o
      administrador (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_VENTAS: ${self:custom.nombresTablas.ventas}
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/ventas.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Verifica tokens con firebase-admin — igual que usuariosMe/
        # catalogarLibro/estantes, se incluye node_modules completo en vez
        # de un allowlist manual (ver gotcha de jose/jwks-rsa en MEMORY.md §7).
        - 'node_modules/**'
    events:
      - httpApi:
          path: /api/ventas
          method: post

  ssr:
    handler: server/ssr/handler.handler
    role: !GetAtt SsrLambdaRole.Arn
    description: >-
      Renderizado SSR de Angular (catálogo público + app shell autenticada).
      Sin permisos de DynamoDB: solo renderiza, no accede a datos directamente.
    memorySize: 512
    environment:
      # Protección SSRF de Angular (`AngularNodeAppEngine`) exige una lista
      # explícita de hosts permitidos; sin dominio personalizado todavía
      # (fuera de alcance de esta tarea), se autoriza el host real generado
      # por API Gateway para que el SSR pueda responder en este esqueleto.
      NG_ALLOWED_HOSTS: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    package:
      patterns:
        - '!**'
        - 'dist/babel-letiende/**'
        - 'server/ssr/handler.mjs'
        - 'node_modules/@codegenie/serverless-express/**'
    events:
      - httpApi:
          path: /
          method: get
      - httpApi:
          path: /{proxy+}
          method: '*'

resources:
  Resources:
    # --- Roles IAM de mínimo privilegio (uno por función) ---
    ApiLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-api-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          - PolicyName: babel-api-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:UpdateItem
                    - dynamodb:DeleteItem
                    - dynamodb:Query
                    - dynamodb:Scan
                    - dynamodb:BatchGetItem
                    - dynamodb:BatchWriteItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                    - !Sub '${TablaLibros.Arn}/index/*'
                    - !GetAtt TablaVentas.Arn
                    - !Sub '${TablaVentas.Arn}/index/*'
                    - !GetAtt TablaEstantes.Arn
                    - !GetAtt TablaEditorialesDescuentos.Arn
                    - !GetAtt TablaUsuarios.Arn

    UsuariosMeLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-usuarios-me-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Más acotado que ApiLambdaRole a propósito: esta función solo lee
          # un ítem por clave primaria de una única tabla (CLAUDE.md A05).
          - PolicyName: babel-usuarios-me-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    LibrosLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-libros-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Solo lectura (Scan) sobre babel-libros — endpoint público de
          # solo consulta, sin necesidad de escribir ni leer otras tablas
          # (CLAUDE.md A05).
          - PolicyName: babel-libros-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:Scan
                  Resource:
                    - !GetAtt TablaLibros.Arn

    CatalogarLibroLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-catalogar-libro-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Escribe en babel-libros y solo lee (GetItem) babel-usuarios para
          # resolver el rol del token — sin acceso a ninguna otra tabla
          # (CLAUDE.md A05, ADR-008).
          - PolicyName: babel-catalogar-libro-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:PutItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    EstantesLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-estantes-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # CRUD completo sobre babel-estantes y solo lee (GetItem)
          # babel-usuarios para resolver el rol del token — sin acceso a
          # ninguna otra tabla (CLAUDE.md A05, ADR-008).
          - PolicyName: babel-estantes-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:DeleteItem
                    - dynamodb:Scan
                  Resource:
                    - !GetAtt TablaEstantes.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    RegistrarVentaLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-registrar-venta-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Escribe en babel-ventas, lee y actualiza (decrementa
          # cantidadDisponible) babel-libros, y solo lee babel-usuarios para
          # resolver el rol del token — sin acceso a ninguna otra tabla
          # (CLAUDE.md A05, ADR-008).
          - PolicyName: babel-registrar-venta-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:PutItem
                  Resource:
                    - !GetAtt TablaVentas.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:UpdateItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    SsrLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-ssr-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # Sin políticas adicionales: el SSR solo renderiza, no accede a DynamoDB.

    # --- Tablas DynamoDB (tech-specs.md §5.1) ---
    # Capacidad aprovisionada 25/25 en todas (capa siempre gratuita de AWS,
    # ver tech-specs.md §7.3 — objetivo de costo $0, nunca on-demand).
    TablaLibros:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.libros}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: bookId
            AttributeType: S
          - AttributeName: isbn
            AttributeType: S
        KeySchema:
          - AttributeName: bookId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: isbn-index
            KeySchema:
              - AttributeName: isbn
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 25
              WriteCapacityUnits: 25

    TablaVentas:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.ventas}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: ventaId
            AttributeType: S
          - AttributeName: vendidoEn
            AttributeType: S
        KeySchema:
          - AttributeName: ventaId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: vendidoEn-index
            KeySchema:
              - AttributeName: vendidoEn
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 25
              WriteCapacityUnits: 25

    TablaEstantes:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.estantes}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: estanteId
            AttributeType: S
        KeySchema:
          - AttributeName: estanteId
            KeyType: HASH

    TablaEditorialesDescuentos:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.editorialesDescuentos}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: editorial
            AttributeType: S
        KeySchema:
          - AttributeName: editorial
            KeyType: HASH

    TablaUsuarios:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.usuarios}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
