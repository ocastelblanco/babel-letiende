              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Solo lectura: Scan sobre babel-ventas, GetItem puntual sobre
          # babel-libros (resolver editorial por bookId al filtrar) y sobre
          # babel-usuarios (resolver el rol del token) — sin acceso de
          # escritura a ninguna tabla (CLAUDE.md A05, ADR-008).
          - PolicyName: babel-listar-ventas-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:Scan
                  Resource:
                    - !GetAtt TablaVentas.Arn
                - Effect: Allow
