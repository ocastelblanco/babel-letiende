          method: '*'

resources:
  Resources:
    # --- Roles IAM de mínimo privilegio (uno por función) ---
    ApiLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-api-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          - PolicyName: babel-api-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:UpdateItem
                    - dynamodb:DeleteItem
                    - dynamodb:Query
                    - dynamodb:Scan
                    - dynamodb:BatchGetItem
                    - dynamodb:BatchWriteItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                    - !Sub '${TablaLibros.Arn}/index/*'
                    - !GetAtt TablaVentas.Arn
                    - !GetAtt TablaEstantes.Arn
                    - !GetAtt TablaEditorialesDescuentos.Arn
                    - !GetAtt TablaSitiosScraping.Arn
                    - !GetAtt TablaUsuarios.Arn

    UsuariosMeLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-usuarios-me-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Más acotado que ApiLambdaRole a propósito: esta función solo lee
          # un ítem por clave primaria de una única tabla (CLAUDE.md A05).
          - PolicyName: babel-usuarios-me-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaUsuarios.Arn

    LibrosLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-libros-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Solo lectura (Scan) sobre babel-libros — endpoint público de
          # solo consulta, sin necesidad de escribir ni leer otras tablas
