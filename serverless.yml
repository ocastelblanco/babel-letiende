service: babel-letiende

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs24.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  httpApi:
    cors: true
  # Cada función define su propio rol de mínimo privilegio más abajo
  # (ver `resources.Resources.ApiLambdaRole` / `SsrLambdaRole`) — ver
  # CLAUDE.md §5 (A05: configuración de seguridad incorrecta).

package:
  individually: true

custom:
  nombresTablas:
    libros: babel-libros-${sls:stage}
    ventas: babel-ventas-${sls:stage}
    estantes: babel-estantes-${sls:stage}
    editorialesDescuentos: babel-editoriales-descuentos-${sls:stage}
    sitiosScraping: babel-sitios-scraping-${sls:stage}
    usuarios: babel-usuarios-${sls:stage}

functions:
  api:
    handler: dist-server/api/handlers/health.handler
    role: !GetAtt ApiLambdaRole.Arn
    description: >-
      Lógica de negocio de Babel (catalogación, ventas, administración).
      Por ahora solo expone /api/health como placeholder de verificación.
    environment:
      # Nombres "lógicos" (ver tech-specs.md §5.1) resueltos a los nombres
      # reales de tabla por stage, para no chocar entre dev/staging/production.
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_VENTAS: ${self:custom.nombresTablas.ventas}
      TABLA_ESTANTES: ${self:custom.nombresTablas.estantes}
      TABLA_EDITORIALES_DESCUENTOS: ${self:custom.nombresTablas.editorialesDescuentos}
      TABLA_SITIOS_SCRAPING: ${self:custom.nombresTablas.sitiosScraping}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      # Secretos/config externa (tech-specs.md §9) — nunca hardcodeados,
      # quedan vacíos si la variable de entorno no está definida.
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${env:GOOGLE_CUSTOM_SEARCH_API_KEY, ''}
      GOOGLE_CUSTOM_SEARCH_CX: ${env:GOOGLE_CUSTOM_SEARCH_CX, ''}
      API_LETIENDE_BASE_URL: ${env:API_LETIENDE_BASE_URL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/health.js'
    events:
      - httpApi:
          path: /api/health
          method: get
      - httpApi:
          path: /api/{proxy+}
          method: '*'

  usuariosMe:
    handler: dist-server/api/handlers/usuarios-me.handler
    role: !GetAtt UsuariosMeLambdaRole.Arn
    description: >-
      GET /api/usuarios/me — verifica el ID Token de Firebase y resuelve
      el rol contra babel-usuarios (CLAUDE.md A01/A07, tech-specs.md §8.1).
    environment:
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/usuarios-me.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # `firebase-admin` (y sus dependencias transitivas: google-auth-library,
        # jose, gaxios, etc.) y `@aws-sdk/*` no se pueden empaquetar con una
        # lista manual confiable — se incluye node_modules completo para esta
        # función en vez de mantener un allowlist frágil.
        - 'node_modules/**'
        # Recorta paquetes que SOLO usa el frontend Angular o las
        # herramientas de desarrollo, nunca el backend — sin esto, el
        # paquete de cada función Lambda supera el límite de AWS de
        # 262.144.000 bytes descomprimidos (incidente real: el deploy a
        # `staging` falló en `EstantesLambdaFunction` al agregar
        # `@zxing/browser`, que solo tipeó la balanza porque `node_modules`
        # ya rondaba ~570MB sin podar nada — ver MEMORY.md §7). Cada
        # exclusión se verificó con `npm ls <paquete>` para confirmar que
        # ninguna función de backend lo necesita en tiempo de ejecución —
        # en particular `@firebase/**` se excluye casi entero pero se
        # re-incluyen explícitamente los 9 subpaquetes que sí necesita
        # `firebase-admin` a través de `@firebase/database-compat`
        # (Realtime Database, arrastrado por `firebase-admin` aunque Babel
        # no lo use — CLAUDE.md ya aclara que Babel usa Firebase únicamente
        # para autenticación, no Firestore/RTDB). Esta misma lista se
        # repite literal en cada función que empaqueta `node_modules/**`
        # completo: Serverless Framework exige que cada patrón sea un
        # string plano, así que un anchor de YAML referenciado como un solo
        # elemento de la lista queda anidado y falla la validación
        # ("must be string") — no hay forma de compartirla sin repetirla.
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/usuarios/me
          method: get

  libros:
    handler: dist-server/api/handlers/libros.handler
    role: !GetAtt LibrosLambdaRole.Arn
    description: >-
      GET /api/libros — catálogo público de consulta, sin autenticación
      (tech-specs.md §5).
    environment:
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/libros.js'
        - 'dist-server/api/services/dynamodb.js'
        # `libros.js` compilado incluye TANTO `handler` (GET, este) como
        # `handlerCrear` (POST, función `catalogarLibro`) — ambos exports
        # viven en el mismo módulo, así que el `import` de nivel superior a
        # `verificar-token` (usado solo por `handlerCrear`) igual debe
        # resolver aquí, o el runtime de Lambda revienta con
        # `Runtime.ImportModuleError` al invocar CUALQUIER handler del
        # archivo — confirmado en un 500 real en staging (ver MEMORY.md §7).
        - 'dist-server/api/lib/verificar-token.js'
        # Igual que en usuariosMe: no se intenta un allowlist manual de las
        # dependencias transitivas de @aws-sdk/* (ver gotcha de jose/jwks-rsa
        # en MEMORY.md §7) — se incluye node_modules completo.
        - 'node_modules/**'
        # Recorta paquetes solo-frontend/dev-tooling — lista completa y
        # razón de cada exclusión documentada en la función `usuariosMe`
        # (MEMORY.md §7, incidente de tamaño de EstantesLambdaFunction).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/libros
          method: get

  catalogarLibro:
    handler: dist-server/api/handlers/libros.handlerCrear
    role: !GetAtt CatalogarLibroLambdaRole.Arn
    description: >-
      POST /api/libros — cataloga un libro, exige rol vendedor o
      administrador (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/libros.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Misma función (libros.ts) que el GET público, pero esta Lambda
        # además verifica tokens con firebase-admin — igual que usuariosMe,
        # se incluye node_modules completo en vez de un allowlist manual.
        - 'node_modules/**'
        # Recorta paquetes solo-frontend/dev-tooling — lista completa y
        # razón de cada exclusión documentada en la función `usuariosMe`
        # (MEMORY.md §7, incidente de tamaño de EstantesLambdaFunction).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/libros
          method: post

  cambiarEstanteLibro:
    handler: dist-server/api/handlers/libros.handlerCambiarEstante
    role: !GetAtt CambiarEstanteLibroLambdaRole.Arn
    description: >-
      PATCH /api/libros/:bookId/estante — cambia el estante de un libro,
      exige rol vendedor o administrador (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_LIBROS: ${self:custom.nombresTablas.libros}
      TABLA_ESTANTES: ${self:custom.nombresTablas.estantes}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/libros.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Misma función (libros.ts) que GET/POST — mismo cuidado documentado
        # arriba (MEMORY.md §7): un import nuevo a nivel superior afecta a
        # las 3 funciones Lambda que comparten este archivo, no solo esta.
        - 'node_modules/**'
        # Recorta paquetes solo-frontend/dev-tooling — lista completa y
        # razón de cada exclusión documentada en la función `usuariosMe`
        # (MEMORY.md §7, incidente de tamaño de EstantesLambdaFunction).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/libros/{bookId}/estante
          method: patch

  estantes:
    handler: dist-server/api/handlers/estantes.handler
    role: !GetAtt EstantesLambdaRole.Arn
    description: >-
      CRUD /api/estantes — GET acepta vendedor o administrador, POST/PUT/
      DELETE exigen administrador (CLAUDE.md A01, ADR-008).
    environment:
      TABLA_ESTANTES: ${self:custom.nombresTablas.estantes}
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/estantes.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        # Verifica tokens con firebase-admin — igual que usuariosMe/
        # catalogarLibro, se incluye node_modules completo en vez de un
        # allowlist manual (ver gotcha de jose/jwks-rsa en MEMORY.md §7).
        - 'node_modules/**'
        # Recorta paquetes solo-frontend/dev-tooling — lista completa y
        # razón de cada exclusión documentada en la función `usuariosMe`
        # (MEMORY.md §7, incidente de tamaño de EstantesLambdaFunction).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/estantes
          method: get
      - httpApi:
          path: /api/estantes
          method: post
      - httpApi:
          path: /api/estantes/{estanteId}
          method: put
      - httpApi:
          path: /api/estantes/{estanteId}
          method: delete

  metadatos:
    handler: dist-server/api/handlers/metadatos.handler
    role: !GetAtt MetadatosLambdaRole.Arn
    description: >-
      GET /api/metadatos/:isbn — autocompleta título/autor/editorial/portada/
      pvp combinando api.letiende.co con scraping en paralelo, exige rol
      vendedor o administrador (CLAUDE.md A01, ADR-008).
    # provider.timeout (10s) no alcanza: hasta 4 sitios de scraping en
    # paralelo, el más lento (Tornamesa, 2 peticiones internas de hasta
    # TIMEOUT_MS=8000 cada una en scraping.ts) puede tardar ~16s. Al ser
    # paralelo (no secuencial) el peor caso queda acotado al sitio más lento,
    # no a la suma de todos — 25s da margen real sobre esos ~16s (TODO.md,
    # Tarea 1).
    timeout: 25
    environment:
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      TABLA_SITIOS_SCRAPING: ${self:custom.nombresTablas.sitiosScraping}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
      API_LETIENDE_BASE_URL: ${env:API_LETIENDE_BASE_URL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/metadatos.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        - 'dist-server/api/services/api-letiende.js'
        - 'dist-server/api/services/scraping.js'
        # Verifica tokens con firebase-admin — igual que usuariosMe/
        # catalogarLibro/estantes/usuarios, se incluye node_modules completo
        # en vez de un allowlist manual (ver gotcha de jose/jwks-rsa en
        # MEMORY.md §7).
        - 'node_modules/**'
        # Recorta paquetes solo-frontend/dev-tooling — lista completa y
        # razón de cada exclusión documentada en la función `usuariosMe`
        # (MEMORY.md §7, incidente de tamaño de EstantesLambdaFunction).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
          path: /api/metadatos/{isbn}
          method: get

  metadatosBuscar:
    handler: dist-server/api/handlers/metadatos.handlerBuscar
    role: !GetAtt MetadatosBuscarLambdaRole.Arn
    description: >-
      GET /api/metadatos/buscar?titulo=&autor= — busca candidatos por
      título/autor (api.letiende.co + Lerner + Nacional en paralelo) para
      cuando el vendedor no tiene el ISBN, exige rol vendedor o
      administrador (CLAUDE.md A01, ADR-008).
    # Mismo criterio que `metadatos` (arriba): 3 fuentes en paralelo, el
    # provider.timeout (10s) no da margen suficiente.
    timeout: 25
    environment:
      TABLA_USUARIOS: ${self:custom.nombresTablas.usuarios}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${env:FIREBASE_SERVICE_ACCOUNT_BABEL, ''}
      API_LETIENDE_BASE_URL: ${env:API_LETIENDE_BASE_URL, ''}
    package:
      patterns:
        - '!**'
        - 'dist-server/api/handlers/metadatos.js'
        - 'dist-server/api/lib/verificar-token.js'
        - 'dist-server/api/services/dynamodb.js'
        - 'dist-server/api/services/api-letiende.js'
        - 'dist-server/api/services/scraping.js'
        # Verifica tokens con firebase-admin — mismo criterio que `metadatos`.
        - 'node_modules/**'
        # Mismo recorte de paquetes solo-frontend/dev-tooling que `metadatos`
        # (MEMORY.md §7).
        - '!node_modules/@angular/**'
        - '!node_modules/firebase/**'
        - '!node_modules/@zxing/**'
        - '!node_modules/rxjs/**'
        - '!node_modules/typescript/**'
        - '!node_modules/@types/**'
        - '!node_modules/vite/**'
        - '!node_modules/vitest/**'
        - '!node_modules/tailwindcss/**'
        - '!node_modules/@tailwindcss/**'
        - '!node_modules/postcss/**'
        - '!node_modules/prettier/**'
        - '!node_modules/jsdom/**'
        - '!node_modules/serverless/**'
        - '!node_modules/@babel/**'
        - '!node_modules/@esbuild/**'
        - '!node_modules/zod/**'
        - '!node_modules/@algolia/**'
        - '!node_modules/algoliasearch/**'
        - '!node_modules/@modelcontextprotocol/**'
        - '!node_modules/@firebase/**'
        - 'node_modules/@firebase/database-compat/**'
        - 'node_modules/@firebase/database/**'
        - 'node_modules/@firebase/database-types/**'
        - 'node_modules/@firebase/logger/**'
        - 'node_modules/@firebase/util/**'
        - 'node_modules/@firebase/component/**'
        - 'node_modules/@firebase/app-check-interop-types/**'
        - 'node_modules/@firebase/auth-interop-types/**'
        - 'node_modules/@firebase/app-types/**'
    events:
      - httpApi:
