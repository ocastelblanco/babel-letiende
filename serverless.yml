    ExportarVentasLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-exportar-ventas-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          # Mismo alcance de solo lectura que ListarVentasLambdaRole: Scan
          # sobre babel-ventas, GetItem puntual sobre babel-libros (resolver
          # título/editorial por bookId) y sobre babel-usuarios (resolver el
          # rol del token) — sin acceso de escritura a ninguna tabla
          # (CLAUDE.md A05, ADR-008).
          - PolicyName: babel-exportar-ventas-dynamodb-${sls:stage}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:Scan
                  Resource:
                    - !GetAtt TablaVentas.Arn
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TablaLibros.Arn
                    - !GetAtt TablaUsuarios.Arn

    SsrLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: babel-ssr-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # Sin políticas adicionales: el SSR solo renderiza, no accede a DynamoDB.

    # --- Tablas DynamoDB (tech-specs.md §5.1) ---
    # Capacidad aprovisionada 25/25 en todas (capa siempre gratuita de AWS,
    # ver tech-specs.md §7.3 — objetivo de costo $0, nunca on-demand).
    TablaLibros:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.libros}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: bookId
            AttributeType: S
          - AttributeName: isbn
            AttributeType: S
        KeySchema:
          - AttributeName: bookId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: isbn-index
            KeySchema:
              - AttributeName: isbn
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 25
              WriteCapacityUnits: 25

    TablaVentas:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.ventas}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: ventaId
            AttributeType: S
        KeySchema:
          - AttributeName: ventaId
            KeyType: HASH
        # Sin GSI a propósito: el vendidoEn-index original (vendidoEn como
        # única clave de partición, sin sort key) nunca admitió Query por
        # rango — solo igualdad exacta de un timestamp con milisegundos,
        # inservible para reportes — y aún así reservaba 25/25 RCU/WCU
        # propios y duplicaba el almacenamiento de cada venta, contra el
        # objetivo de costo $0. GET /api/ventas filtra por rango de fecha
        # con Scan + filtrado en memoria (criterio de tablas pequeñas, ver
        # MEMORY.md §6/§7); si el volumen algún día lo exige, diseñar un
        # GSI real con partición fija + vendidoEn como clave de rango.

    TablaEstantes:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.estantes}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: estanteId
            AttributeType: S
        KeySchema:
          - AttributeName: estanteId
            KeyType: HASH

    TablaEditorialesDescuentos:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.editorialesDescuentos}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: editorial
            AttributeType: S
        KeySchema:
          - AttributeName: editorial
            KeyType: HASH

    TablaSitiosScraping:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.sitiosScraping}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: dominio
            AttributeType: S
        KeySchema:
          - AttributeName: dominio
            KeyType: HASH

    TablaUsuarios:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.nombresTablas.usuarios}
        BillingMode: PROVISIONED
        ProvisionedThroughput:
          ReadCapacityUnits: 25
          WriteCapacityUnits: 25
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
