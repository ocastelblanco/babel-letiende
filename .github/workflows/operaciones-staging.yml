name: Operaciones sobre staging

# Job manual (workflow_dispatch) para sembrar, consultar y limpiar datos de
# prueba en las tablas de staging usando los secrets de AWS ya configurados.
# Motivo: las credenciales AWS reales solo existen en GitHub Actions (y en la
# Mac del usuario), así que cualquier sesión de desarrollo — Claude Code CLI,
# Web, Mobile o Desktop — puede cumplir los "Definition of Done" que exigen
# datos reales en staging disparando este workflow (UI de GitHub → Actions →
# "Operaciones sobre staging" → Run workflow, o `gh workflow run`), sin
# credenciales locales. Ver MEMORY.md §5.
#
# Alcance actual: usuarios de prueba en `babel-usuarios-staging` (lo que
# necesita la verificación del ID Token, TODO.md Tarea 1). Agregar aquí
# nuevas operaciones cuando otra tarea exija sembrar/limpiar otras tablas.
#
# `probar-usuarios-me` cierra el otro lado de esa misma tarea: emite un ID
# Token real de Firebase (custom token de firebase-admin, canjeado por la
# REST API de Identity Toolkit) y llama GET /api/usuarios/me desplegado en
# staging, para no depender de un login interactivo de Google. Esto crea
# (y borra al final del mismo run) un usuario real y desechable en el
# proyecto Firebase compartido con Comandante — ver MEMORY.md §9. Usar
# siempre el mismo email que `sembrar-usuario-prueba`/`eliminar-usuario-prueba`
# para probar los casos 403 (correo sin fila en babel-usuarios) y 200
# (con fila) de punta a punta.
#
# `probar-catalogar-libro` (agregada para TODO.md Tarea 1, POST /api/libros):
# mismo mecanismo que `probar-usuarios-me`, pero llama POST /api/libros con
# un libro de prueba fijo. Si la petición responde 201, borra el libro creado
# de `babel-libros-staging` al final del mismo run — no depende de
# `eliminar-usuario-prueba` para limpiar (esa sigue siendo necesaria solo
# para la fila de `babel-usuarios-staging` sembrada con `sembrar-usuario-prueba`).
#
# `eliminar-libro-prueba` (agregada junto con `probar-catalogar-libro`): borra
# un ítem puntual de `babel-libros-staging` por `bookId` (input `bookId`) —
# de respaldo manual si `probar-catalogar-libro` no llega a limpiar su propio
# libro de prueba (p. ej. por el bug real de "Region is missing" que motivó
# agregar `AWS_REGION` más abajo, ver MEMORY.md §7).
#
# `sembrar-libros-demo`: siembra 3 libros reales y presentables (no
# desechables) en `babel-libros-staging`, para poder probar el catálogo
# público (CatalogoPublicoComponent) desde el navegador con datos que se
# vean bien. Usa `bookId` fijos (`demo-1`/`demo-2`/`demo-3`) — correrla de
# nuevo actualiza los mismos 3 ítems en vez de crear duplicados. Para
# quitarlos, usar `eliminar-libro-prueba` con cada `bookId`.
#
# `sembrar-estantes-demo`: mismo patrón que `sembrar-libros-demo`, pero
# siembra 2 estantes reales y presentables (`estante-1`/`estante-2`) en
# `babel-estantes-staging`, para que el <select> de CatalogarLibroComponent
# tenga opciones reales al probar la catalogación manual desde el
# navegador. Son los mismos IDs que ya referencian los libros de
# `sembrar-libros-demo` (hasta ahora apuntaban a estantes inexistentes).
#
# `probar-estantes` (TODO.md Tarea 1, CRUD /api/estantes): mismo mecanismo
# de ID Token real. `GET /api/estantes` primero — si el correo no es
# administrador (403) o el token no es válido (401), el script se detiene
# ahí. Si es administrador (200), corre el ciclo completo
# POST → GET → PUT → DELETE con un estante de prueba y lo limpia al final.
#
# `probar-registrar-venta` (TODO.md Tarea 1, POST /api/ventas): mismo
# mecanismo de ID Token real. Primero cataloga un libro de prueba real con
# POST /api/libros — si el correo no es vendedor/administrador, ese POST ya
# responde 403 y el script se detiene ahí. Si el libro se cataloga (201),
# lo vende con POST /api/ventas y verifica que cantidadDisponible bajó.
# Limpia el libro y la venta de prueba al terminar.
#
# `probar-usuarios-crud` (TODO.md Tarea 1, CRUD /api/usuarios): mismo
# mecanismo de ID Token real. `GET /api/usuarios` primero — si el correo no
# es administrador (403) o el token no es válido (401), el script se
# detiene ahí. Si es administrador (200), confirma primero la salvaguarda
# de auto-degradación/auto-eliminación (ADR-009: PUT/DELETE sobre el propio
# email del token deben responder 400) y luego corre el ciclo completo
# POST → PUT → GET → DELETE sobre un usuario objetivo de prueba distinto
# del propio administrador, limpiándolo al final.
#
# `probar-editoriales-descuentos-crud` (TODO.md Tarea 1, CRUD
# /api/editoriales-descuentos): mismo mecanismo de ID Token real. `GET
# /api/editoriales-descuentos` primero — si el correo no es administrador
# (403) o el token no es válido (401), el script se detiene ahí. Si es
# administrador (200), corre el ciclo completo POST → PUT → GET → DELETE
# sobre una editorial de prueba fija, limpiándola al final.
#
# `probar-cambiar-estante` (TODO.md Tarea 1, PATCH /api/libros/:bookId/
# estante): mismo mecanismo de ID Token real. Siembra dos estantes
# desechables por DynamoDB directo (origen/destino, sin depender de que
# estante-1/estante-2 ya existan), cataloga un libro de prueba apuntando al
# origen (POST /api/libros — si el correo no es vendedor/administrador,
# responde 403 y el script se detiene ahí), cambia su estante al destino
# (PATCH) y confirma el cambio con GET /api/libros. Limpia el libro y ambos
# estantes de prueba al terminar.
#
# `probar-listar-ventas` (TODO.md Tarea 1, GET /api/ventas): mismo
# mecanismo de ID Token real. `GET /api/ventas` primero (sin datos de
# prueba todavía) — si el correo no es administrador (403) o el token no
# es válido (401), el script se detiene ahí. Si es administrador (200),
# cataloga 2 libros de prueba (editoriales distintas) y los vende (formas
# de pago distintas), verifica GET /api/ventas sin filtro y filtrando por
# formaDePago/editorial, y limpia libros y ventas de prueba al terminar.

on:
  workflow_dispatch:
    inputs:
      operacion:
        description: 'Operación a ejecutar'
        required: true
        type: choice
        options:
          - sembrar-usuario-prueba
          - consultar-usuario-prueba
          - eliminar-usuario-prueba
          - probar-usuarios-me
          - ver-logs-usuarios-me
          - probar-catalogar-libro
          - eliminar-libro-prueba
          - ver-logs-libros
          - sembrar-libros-demo
          - sembrar-estantes-demo
          - probar-estantes
          - ver-logs-estantes
          - probar-registrar-venta
          - ver-logs-registrar-venta
          - probar-usuarios-crud
          - ver-logs-usuarios
          - probar-editoriales-descuentos-crud
          - ver-logs-editoriales-descuentos
          - probar-cambiar-estante
          - ver-logs-cambiar-estante-libro
          - probar-listar-ventas
          - ver-logs-listar-ventas
      email:
        description: 'Email del usuario de prueba (no aplica a ver-logs-*/eliminar-libro-prueba/sembrar-libros-demo/sembrar-estantes-demo, poner cualquier valor)'
        required: true
        type: string
      rol:
        description: 'Rol del usuario (solo aplica a sembrar-usuario-prueba)'
        required: false
        type: choice
        options:
          - vendedor
          - administrador
        default: vendedor
      nombre:
        description: 'Nombre del usuario (solo aplica a sembrar-usuario-prueba)'
        required: false
        type: string
        default: Usuario de prueba
      bookId:
        description: 'bookId del libro a eliminar (solo aplica a eliminar-libro-prueba)'
        required: false
        type: string

jobs:
  operar-staging:
    name: ${{ inputs.operacion }} (${{ inputs.email }})
    runs-on: ubuntu-latest
    environment:
      name: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # AWS_DEFAULT_REGION es la convención del AWS CLI (usada por los `aws
      # dynamodb ...` de este workflow); el SDK de JavaScript v3 (usado por
      # probar-catalogar-libro.mjs vía @aws-sdk/client-dynamodb) resuelve la
      # región con AWS_REGION, no con AWS_DEFAULT_REGION — sin esta, el SDK
      # falla con "Region is missing" (confirmado en un run real, ver
      # MEMORY.md §7). Se declaran ambas para cubrir los dos casos.
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      TABLA_USUARIOS: babel-usuarios-staging
      TABLA_LIBROS: babel-libros-staging
      TABLA_ESTANTES: babel-estantes-staging
      TABLA_VENTAS: babel-ventas-staging
      # Los inputs se pasan por variables de entorno (nunca interpolados
      # directamente en el script) para evitar inyección de comandos.
      OPERACION: ${{ inputs.operacion }}
      EMAIL: ${{ inputs.email }}
      ROL: ${{ inputs.rol }}
      NOMBRE: ${{ inputs.nombre }}
      BOOK_ID: ${{ inputs.bookId }}
      FIREBASE_SERVICE_ACCOUNT_BABEL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BABEL }}
      URL_STAGING: https://oyzau0c910.execute-api.us-east-1.amazonaws.com
    steps:
      - name: Checkout del código
        # Solo lo necesita probar-usuarios-me (usa firebase-admin del
        # package.json del repo) — inofensivo y rápido para las demás.
        uses: actions/checkout@v4

      - name: Configurar Node.js
        if: inputs.operacion == 'probar-usuarios-me' || inputs.operacion == 'probar-catalogar-libro' || inputs.operacion == 'sembrar-libros-demo' || inputs.operacion == 'sembrar-estantes-demo' || inputs.operacion == 'probar-estantes' || inputs.operacion == 'probar-registrar-venta' || inputs.operacion == 'probar-usuarios-crud' || inputs.operacion == 'probar-editoriales-descuentos-crud' || inputs.operacion == 'probar-cambiar-estante' || inputs.operacion == 'probar-listar-ventas'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependencias (reproducible, package-lock.json)
        if: inputs.operacion == 'probar-usuarios-me' || inputs.operacion == 'probar-catalogar-libro' || inputs.operacion == 'sembrar-libros-demo' || inputs.operacion == 'sembrar-estantes-demo' || inputs.operacion == 'probar-estantes' || inputs.operacion == 'probar-registrar-venta' || inputs.operacion == 'probar-usuarios-crud' || inputs.operacion == 'probar-editoriales-descuentos-crud' || inputs.operacion == 'probar-cambiar-estante' || inputs.operacion == 'probar-listar-ventas'
        run: npm ci

      - name: Validar email
        if: inputs.operacion != 'ver-logs-usuarios-me' && inputs.operacion != 'ver-logs-libros' && inputs.operacion != 'ver-logs-estantes' && inputs.operacion != 'ver-logs-registrar-venta' && inputs.operacion != 'ver-logs-usuarios' && inputs.operacion != 'ver-logs-editoriales-descuentos' && inputs.operacion != 'ver-logs-cambiar-estante-libro' && inputs.operacion != 'ver-logs-listar-ventas' && inputs.operacion != 'eliminar-libro-prueba' && inputs.operacion != 'sembrar-libros-demo' && inputs.operacion != 'sembrar-estantes-demo'
        run: |
          if ! printf '%s' "$EMAIL" | grep -Eq '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'; then
            echo "::error::El email '$EMAIL' no tiene un formato válido."
            exit 1
          fi

      - name: Validar bookId
        if: inputs.operacion == 'eliminar-libro-prueba'
        run: |
          if [ -z "$BOOK_ID" ]; then
            echo "::error::Falta el input 'bookId' para eliminar-libro-prueba."
            exit 1
          fi

      - name: Ejecutar operación
        if: inputs.operacion != 'probar-usuarios-me' && inputs.operacion != 'ver-logs-usuarios-me' && inputs.operacion != 'probar-catalogar-libro' && inputs.operacion != 'eliminar-libro-prueba' && inputs.operacion != 'ver-logs-libros' && inputs.operacion != 'sembrar-libros-demo' && inputs.operacion != 'sembrar-estantes-demo' && inputs.operacion != 'probar-estantes' && inputs.operacion != 'ver-logs-estantes' && inputs.operacion != 'probar-registrar-venta' && inputs.operacion != 'ver-logs-registrar-venta' && inputs.operacion != 'probar-usuarios-crud' && inputs.operacion != 'ver-logs-usuarios' && inputs.operacion != 'probar-editoriales-descuentos-crud' && inputs.operacion != 'ver-logs-editoriales-descuentos' && inputs.operacion != 'probar-cambiar-estante' && inputs.operacion != 'ver-logs-cambiar-estante-libro' && inputs.operacion != 'probar-listar-ventas' && inputs.operacion != 'ver-logs-listar-ventas'
        run: |
          case "$OPERACION" in
            sembrar-usuario-prueba)
              item=$(jq -n \
                --arg email "$EMAIL" \
                --arg nombre "$NOMBRE" \
                --arg rol "$ROL" \
                --arg creadoEn "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
                '{
                  email:    { S: $email },
                  nombre:   { S: $nombre },
                  fotoUrl:  { NULL: true },
                  rol:      { S: $rol },
                  creadoEn: { S: $creadoEn }
                }')
              aws dynamodb put-item --table-name "$TABLA_USUARIOS" --item "$item"
              echo "✅ Usuario de prueba sembrado en $TABLA_USUARIOS: $EMAIL (rol: $ROL)"
              ;;
            consultar-usuario-prueba)
              clave=$(jq -n --arg email "$EMAIL" '{ email: { S: $email } }')
              aws dynamodb get-item --table-name "$TABLA_USUARIOS" --key "$clave" --output json | tee /tmp/resultado.json
              if jq -e '.Item' /tmp/resultado.json > /dev/null; then
                echo "✅ El usuario $EMAIL existe en $TABLA_USUARIOS (ver Item arriba)"
              else
                echo "ℹ️ El usuario $EMAIL NO existe en $TABLA_USUARIOS"
              fi
              ;;
            eliminar-usuario-prueba)
              clave=$(jq -n --arg email "$EMAIL" '{ email: { S: $email } }')
              aws dynamodb delete-item --table-name "$TABLA_USUARIOS" --key "$clave" \
                --return-values ALL_OLD --output json | tee /tmp/resultado.json
              if jq -e '.Attributes' /tmp/resultado.json > /dev/null; then
                echo "🧹 Usuario de prueba eliminado de $TABLA_USUARIOS: $EMAIL"
              else
                echo "ℹ️ No había nada que eliminar: $EMAIL no existía en $TABLA_USUARIOS"
              fi
              ;;
            *)
              echo "::error::Operación desconocida: $OPERACION"
              exit 1
              ;;
          esac

      - name: Emitir un ID Token real (firebase-admin) y probar GET /api/usuarios/me
        if: inputs.operacion == 'probar-usuarios-me'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-usuarios-me.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Eliminar libro de prueba
        if: inputs.operacion == 'eliminar-libro-prueba'
        run: |
          clave=$(jq -n --arg bookId "$BOOK_ID" '{ bookId: { S: $bookId } }')
          aws dynamodb delete-item --table-name "$TABLA_LIBROS" --key "$clave" \
            --return-values ALL_OLD --output json | tee /tmp/resultado.json
          if jq -e '.Attributes' /tmp/resultado.json > /dev/null; then
            echo "🧹 Libro de prueba eliminado de $TABLA_LIBROS: $BOOK_ID"
          else
            echo "ℹ️ No había nada que eliminar: $BOOK_ID no existía en $TABLA_LIBROS"
          fi

      - name: Emitir un ID Token real (firebase-admin) y probar POST /api/libros
        if: inputs.operacion == 'probar-catalogar-libro'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-catalogar-libro.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Sembrar libros de demostración
        if: inputs.operacion == 'sembrar-libros-demo'
        run: node server/scripts/sembrar-libros-demo.mjs

      - name: Sembrar estantes de demostración
        if: inputs.operacion == 'sembrar-estantes-demo'
        run: node server/scripts/sembrar-estantes-demo.mjs

      - name: Emitir un ID Token real (firebase-admin) y probar el CRUD de /api/estantes
        if: inputs.operacion == 'probar-estantes'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-estantes.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Emitir un ID Token real (firebase-admin) y probar POST /api/ventas
        if: inputs.operacion == 'probar-registrar-venta'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-registrar-venta.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Emitir un ID Token real (firebase-admin) y probar el CRUD de /api/usuarios
        if: inputs.operacion == 'probar-usuarios-crud'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-usuarios-crud.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Emitir un ID Token real (firebase-admin) y probar el CRUD de /api/editoriales-descuentos
        if: inputs.operacion == 'probar-editoriales-descuentos-crud'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-editoriales-descuentos-crud.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Emitir un ID Token real (firebase-admin) y probar PATCH /api/libros/:bookId/estante
        if: inputs.operacion == 'probar-cambiar-estante'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-cambiar-estante.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Emitir un ID Token real (firebase-admin) y probar GET /api/ventas
        if: inputs.operacion == 'probar-listar-ventas'
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_BABEL" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT_BABEL."
            exit 1
          fi
          node server/scripts/probar-listar-ventas.mjs
        env:
          EMAIL: ${{ inputs.email }}

      - name: Ver logs recientes de la Lambda usuariosMe
        if: inputs.operacion == 'ver-logs-usuarios-me'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-usuariosMe"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda libros
        if: inputs.operacion == 'ver-logs-libros'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-libros"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda estantes
        if: inputs.operacion == 'ver-logs-estantes'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-estantes"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda registrarVenta
        if: inputs.operacion == 'ver-logs-registrar-venta'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-registrarVenta"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda usuarios
        if: inputs.operacion == 'ver-logs-usuarios'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-usuarios"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda editorialesDescuentos
        if: inputs.operacion == 'ver-logs-editoriales-descuentos'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-editorialesDescuentos"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda cambiarEstanteLibro
        if: inputs.operacion == 'ver-logs-cambiar-estante-libro'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-cambiarEstanteLibro"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Ver logs recientes de la Lambda listarVentas
        if: inputs.operacion == 'ver-logs-listar-ventas'
        run: |
          grupo="/aws/lambda/babel-letiende-staging-listarVentas"
          desde_ms=$(( ($(date +%s) - 900) * 1000 ))
          aws logs filter-log-events \
            --log-group-name "$grupo" \
            --start-time "$desde_ms" \
            --output text \
            --query 'events[*].message'

      - name: Resumen
        run: |
          {
            echo "## Operaciones sobre staging"
            echo ""
            echo "- **Operación:** $OPERACION"
            echo "- **Tabla:** $TABLA_USUARIOS"
            echo "- **Email:** $EMAIL"
          } >> "$GITHUB_STEP_SUMMARY"
