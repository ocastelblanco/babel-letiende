name: Build, test y despliegue

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '24'

jobs:
  build-y-test:
    name: Build + test (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias (reproducible, package-lock.json)
        run: npm ci

      - name: Build de producción del frontend Angular (SSR)
        run: npm run build -- --configuration=production

      - name: Build de TypeScript de la Lambda "api"
        run: npm run build:api

      - name: Pruebas unitarias (frontend)
        run: npm test -- --watch=false

      - name: Pruebas unitarias (backend)
        run: npm run test:api

      - name: Verificar sintaxis de infraestructura (serverless package)
        run: npx serverless package --stage staging
        env:
          # License Key de Serverless Framework v4 (sin depender del dashboard),
          # necesaria para que la CLI opere en CI sin login interactivo.
          # No listada en tech-specs.md §9 (se agrega aquí por requerimiento
          # de la propia CLI, no del dominio de Babel). Configurada como
          # GitHub Secret por el usuario el 2026-07-17.
          SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  desplegar-staging:
    name: Deploy a staging
    if: github.event_name == 'pull_request'
    needs: build-y-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://oyzau0c910.execute-api.us-east-1.amazonaws.com
    concurrency:
      # Un solo despliegue de staging a la vez: si hay pushes seguidos al
      # mismo PR (o PRs distintos abiertos en paralelo), solo el más
      # reciente termina desplegado — evita que dos runs se pisen entre sí
      # sobre el mismo stack compartido de staging.
      group: desplegar-staging
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias (reproducible, package-lock.json)
        run: npm ci

      - name: Build de producción del frontend Angular (SSR)
        run: npm run build -- --configuration=production

      - name: Build de TypeScript de la Lambda "api"
        run: npm run build:api

      - name: Desplegar con Serverless Framework (stage staging)
        run: npx serverless deploy --stage staging
        env:
          SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Secretos de negocio que serverless.yml inyecta como variables de
          # entorno de la Lambda "api" (con valor por defecto '' si el secret
          # aún no existe en GitHub, así que su ausencia no rompe el deploy).
          FIREBASE_SERVICE_ACCOUNT_BABEL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BABEL }}
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_CX: ${{ secrets.GOOGLE_CUSTOM_SEARCH_CX }}
          API_LETIENDE_BASE_URL: ${{ secrets.API_LETIENDE_BASE_URL }}

      - name: Smoke test contra staging recién desplegado
        run: |
          url="https://oyzau0c910.execute-api.us-east-1.amazonaws.com/api/health"
          codigo=$(curl -sS -o /tmp/salud.json -w '%{http_code}' "$url")
          echo "GET $url → HTTP $codigo"
          cat /tmp/salud.json
          test "$codigo" = "200"

      - name: Comentar la URL de staging en el PR
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body \
            "🚀 Desplegado a **staging**: https://oyzau0c910.execute-api.us-east-1.amazonaws.com"
        env:
          GH_TOKEN: ${{ github.token }}

  desplegar-produccion:
    name: Deploy a producción
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      # Mismo motivo que el grupo `desplegar-staging`: si varios PRs se
      # fusionan a `main` en sucesión rápida, cada merge dispara su propio
      # push y su propio deploy a producción — sin este grupo, dos runs
      # pueden intentar actualizar el mismo stack de CloudFormation a la vez
      # y fallar con "Stack ... is in UPDATE_IN_PROGRESS state and can not be
      # updated" (incidente real: PR #35/#36/#37 fusionados en <1 minuto,
      # 2 de los 3 deploys a producción chocaron y fallaron — ver MEMORY.md
      # §7). `cancel-in-progress: false` (a diferencia de staging) porque en
      # producción preferimos que el run en curso termine en vez de
      # cancelarlo a mitad de un `serverless deploy`; el siguiente run en
      # cola simplemente espera su turno.
      group: desplegar-produccion
      cancel-in-progress: false
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias (reproducible, package-lock.json)
        run: npm ci

      - name: Build de producción del frontend Angular (SSR)
        run: npm run build -- --configuration=production

      - name: Build de TypeScript de la Lambda "api"
        run: npm run build:api

      - name: Desplegar con Serverless Framework (stage production)
        run: npx serverless deploy --stage production
        env:
          SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          FIREBASE_SERVICE_ACCOUNT_BABEL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BABEL }}
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_CX: ${{ secrets.GOOGLE_CUSTOM_SEARCH_CX }}
          API_LETIENDE_BASE_URL: ${{ secrets.API_LETIENDE_BASE_URL }}
